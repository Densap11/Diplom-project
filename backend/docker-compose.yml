services:
  backend:
    build:
      context: .
    container_name: activity_service_backend
    env_file:
      - .env
    environment:
      POSTGRES_SERVER: host.docker.internal
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads

  frontend:
    build:
      context: ../frontend
    container_name: activity_service_frontend
    ports:
      - "3000:80"
